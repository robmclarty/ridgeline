id: no-console-in-engine-substrate
# Activates at Phase 4 (atoms) and beyond.
# Rationale: side effects in src/engine/{flows,atoms,composites,adapters}/
# must flow through `ctx.trajectory.emit(...)`, never through `console.*`
# or `process.stdout/stderr.write(...)`. The terminal stays quiet;
# trajectory.jsonl carries substrate detail. Severity is `hint` while these
# directories are empty; Phase 4 lifts to `error` once atoms/ has content.
message: No `console.*` or `process.stdout/stderr.write(...)` in src/engine/{flows,atoms,composites,adapters}/. Route diagnostics through ctx.trajectory.emit(...).
severity: hint
language: typescript
files:
  - "src/engine/atoms/**/*.ts"
  - "src/engine/composites/**/*.ts"
  - "src/engine/flows/**/*.ts"
  - "src/engine/adapters/**/*.ts"
ignores:
  - "src/engine/**/__tests__/**/*.ts"
rule:
  any:
    - pattern: console.log($$$)
    - pattern: console.error($$$)
    - pattern: console.warn($$$)
    - pattern: console.info($$$)
    - pattern: console.debug($$$)
    - pattern: process.stdout.write($$$)
    - pattern: process.stderr.write($$$)
