id: command-run-needs-dispose-finally
# Rationale: every commands/*.ts file that imports fascicle's `run` must
# also call `dispose()` somewhere in the same file (intended to be inside a
# finally block paired with the `run(...)` call). Phase 8 establishes this
# pattern at the command entry point so the Engine's lifecycle is bounded
# by the command invocation, on success/failure/abort paths alike.
message: Commands that import `run` from fascicle must call `dispose()` to bound the Engine lifecycle (place the call in a finally block paired with the run(...) call).
severity: error
language: typescript
files:
  - "src/commands/*.ts"
rule:
  pattern: import { $$$ } from "fascicle"
  inside:
    stopBy: end
    kind: program
    not:
      has:
        stopBy: end
        pattern: $A.dispose()
