id: no-pipeline-imports-in-engine-substrate
# Phase 12 — atoms, composites, flows, and adapters must not import from
# the deleted `src/engine/pipeline/` directory or from the deleted
# `src/engine/claude/{claude.exec,stream.parse,stream.result,stream.display,stream.types}.ts`
# files. Both targets are removed at Phase 11; this rule guards regression
# if either path reappears in the new substrate.
message: Files under src/engine/{flows,atoms,composites,adapters}/ may not import from src/engine/pipeline/ or src/engine/claude/{claude.exec,stream.*}. The substrate is fascicle-based; use atoms, composites, adapters, and flows.
severity: error
language: typescript
files:
  - "src/engine/atoms/**/*.ts"
  - "src/engine/composites/**/*.ts"
  - "src/engine/flows/**/*.ts"
  - "src/engine/adapters/**/*.ts"
ignores:
  - "src/engine/**/__tests__/**/*.ts"
rule:
  kind: import_statement
  has:
    kind: string
    regex: '(pipeline/|claude/(claude\.exec|stream\.parse|stream\.result|stream\.display|stream\.types))'
